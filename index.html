<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>90-Day Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060608;--s1:#0e0e12;--s2:#16161d;--bd:#1e1e28;--tx:#c8c8d0;--dm:#555;--ac:#00c9a7;--rd:#ef4444;--or:#f59e0b;--yl:#eab308;--gn:#22c55e;--bl:#3b82f6}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:540px;margin:0 auto;padding:0 12px 60px}
.hdr{padding:20px 0 0;border-bottom:1px solid var(--bd)}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;color:var(--ac)}
.hdr-sub{font-size:10px;color:var(--dm);letter-spacing:1px;margin-top:3px}
.sync-status{font-size:9px;margin-top:4px;letter-spacing:.5px}
.sync-ok{color:var(--ac)}.sync-saving{color:var(--yl)}.sync-err{color:var(--rd)}.sync-loading{color:var(--bl)}
.hdr-ring{position:relative;width:50px;height:50px}
.hdr-ring svg{width:50px;height:50px}
.hdr-ring span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.nav{display:flex;gap:2px;margin-top:14px}
.nav button{flex:1;padding:10px 0;background:none;border:none;color:var(--dm);font-size:11px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;letter-spacing:.5px;transition:all .2s}
.nav button.on{color:var(--ac);border-bottom-color:var(--ac)}
.nav button:hover{color:var(--tx)}
.day-hdr{display:flex;align-items:center;justify-content:space-between;margin:16px 0}
.day-hdr h2{font-size:15px;color:#fff;font-family:'Space Grotesk',sans-serif}
.day-tag{font-size:10px;color:var(--ac);letter-spacing:1px}
.arr{width:34px;height:34px;background:var(--s1);border:1px solid var(--bd);color:var(--dm);border-radius:8px;cursor:pointer;font-size:13px}
.arr:disabled{opacity:.3;cursor:default}
.score-card{text-align:center;padding:18px;background:var(--s1);border-radius:14px;margin-bottom:16px;border:1px solid var(--bd)}
.score-big{font-size:48px;font-weight:900;font-family:'Space Grotesk',sans-serif}
.score-sub{font-size:12px;color:var(--dm);margin-top:2px}
.score-bar{height:6px;background:var(--s2);border-radius:3px;margin-top:10px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s}
.time-grid{display:flex;justify-content:center;gap:16px;margin-top:12px;flex-wrap:wrap}
.time-box{text-align:center;font-size:10px;color:var(--dm)}
.time-box .v{font-size:14px;font-weight:700;color:var(--tx);margin-bottom:2px}
.day-bar{margin-top:10px}
.day-bar-track{display:flex;height:16px;border-radius:4px;overflow:hidden;background:var(--s2)}
.db-seg{height:100%}
.db-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.db-legend span{font-size:9px;display:flex;align-items:center;gap:3px;color:var(--dm)}
.db-legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
.sec-title{font-size:11px;color:var(--dm);letter-spacing:2px;text-transform:uppercase;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.add-btn{background:var(--ac);color:#000;border:none;font-size:10px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;letter-spacing:.5px;display:block;margin-top:6px}
.slot{background:var(--s1);border-radius:10px;margin-bottom:6px;border-left:3px solid var(--bd);overflow:hidden}
.slot-hdr{padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.slot-hdr:hover{background:var(--s2)}
.slot-name{font-size:12px;font-weight:600;color:var(--tx)}
.slot-meta{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--dm)}
.slot-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:700;color:#000;margin-left:6px}
.slot-body{padding:0 12px 12px;border-top:1px solid var(--bd)}
.field{margin-top:10px}
.field label{display:block;font-size:9px;color:var(--dm);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.time-row{display:flex;gap:8px;align-items:end;flex-wrap:wrap}
.time-row span{color:var(--dm);padding-bottom:6px;font-size:12px}
input[type="time"],input[type="number"],input[type="text"]{background:var(--s2);border:1px solid var(--bd);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
input:focus{border-color:var(--ac)}
input[type="number"]{width:65px;text-align:center}
textarea{width:100%;background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:10px;border-radius:8px;font-size:11px;font-family:inherit;resize:vertical;outline:none}
textarea:focus{border-color:var(--ac)}
.rating-row{display:flex;gap:3px;flex-wrap:wrap}
.r-btn{border:1px solid var(--bd);border-radius:6px;padding:5px 9px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600;background:var(--s2);color:var(--dm);transition:all .15s}
.r-btn:hover{border-color:var(--ac)}
.r-btn.on{color:#000;border-color:transparent}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.d-item{display:flex;align-items:center;gap:5px;background:var(--s2);padding:5px 7px;border-radius:5px}
.d-item span.ic{font-size:13px}
.d-item span.nm{font-size:9px;color:var(--dm);flex:1}
.d-item input{width:42px;background:var(--bg);border:1px solid var(--bd);color:#fff;padding:3px 5px;border-radius:4px;font-size:10px;font-family:inherit;text-align:center}
.extra{background:var(--s1);border-radius:10px;margin-bottom:6px;overflow:hidden}
.extra-hdr{padding:10px 12px;display:flex;align-items:center;gap:10px}
.extra-icon{font-size:17px}
.extra-name{font-size:12px;font-weight:600;flex:1;color:var(--tx)}
.tog{cursor:pointer}
.tog input{display:none}
.tog-t{display:inline-block;width:38px;height:20px;border-radius:10px;background:var(--s2);position:relative;transition:background .2s}
.tog input:checked+.tog-t{background:var(--ac)}
.tog-th{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}
.tog input:checked+.tog-t .tog-th{left:20px}
.extra-body{padding:0 12px 12px;border-top:1px solid var(--bd)}
.extra-row{display:flex;gap:12px;align-items:end;margin-top:10px;flex-wrap:wrap}
.del-btn{background:none;border:1px solid #3a1a1a;color:var(--rd);font-size:9px;padding:3px 8px;border-radius:5px;cursor:pointer;font-family:inherit;margin-left:auto}
.del-btn:hover{background:#1a0a0a}
.future-msg{text-align:center;padding:40px;color:var(--dm);font-size:13px}
.cal-legend{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cal-legend span{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dm)}
.cal-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dl{text-align:center;font-size:9px;color:var(--dm);padding:4px}
.cal-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;cursor:pointer;transition:transform .1s}
.cal-cell:hover{transform:scale(1.1)}
.cal-cell.today{outline:2px solid #fff;outline-offset:-2px}
.cal-cell.future{opacity:.2;cursor:default}
.cal-empty{aspect-ratio:1}
.week-bars{display:flex;gap:3px;align-items:end;height:90px;margin-top:12px}
.wb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wb-track{width:100%;height:70px;background:var(--s1);border-radius:3px;position:relative;overflow:hidden}
.wb-fill{position:absolute;bottom:0;width:100%;border-radius:3px;transition:height .3s}
.wb-label{font-size:7px;color:var(--dm)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.stat-box{background:var(--s1);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--bd)}
.stat-val{font-size:24px;font-weight:900;font-family:'Space Grotesk',sans-serif}
.stat-sub{font-size:12px;font-weight:400;opacity:.4}
.stat-label{font-size:9px;color:var(--dm);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.serious-banner{display:flex;align-items:center;gap:12px;padding:14px;background:var(--s1);border-radius:10px;border:2px solid;margin-bottom:16px}
.serious-icon{font-size:26px}
.serious-text{font-size:13px;font-weight:700}
.serious-sub{font-size:10px;color:var(--dm);margin-top:2px}
.d-stats{background:var(--s1);border-radius:10px;padding:12px}
.d-total{font-size:12px;color:var(--tx);margin-bottom:10px}
.d-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.d-row-l{font-size:10px;color:var(--dm);width:100px;flex-shrink:0}
.d-row-bar{flex:1;height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.d-row-fill{height:100%;background:var(--rd);border-radius:4px}
.d-row-v{font-size:9px;color:var(--dm);width:85px;text-align:right;flex-shrink:0}
.slot-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--s1);border-radius:7px;margin-bottom:3px;flex-wrap:wrap;gap:4px}
.slot-stat-l{font-size:11px;font-weight:600;color:var(--tx)}
.slot-stat-r{font-size:10px;color:var(--dm)}
.histo-row{display:flex;gap:6px;align-items:end;height:100px}
.histo-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.histo-bar{width:100%;height:70px;background:var(--s1);border-radius:4px;position:relative;overflow:hidden}
.histo-fill{position:absolute;bottom:0;width:100%;border-radius:4px}
.histo-label{font-size:8px;color:var(--dm)}
.histo-count{font-size:10px;font-weight:700;color:var(--dm)}
.no-data{color:var(--dm);font-size:12px;font-style:italic;padding:10px 0}
.ap-warn{background:#1a1608;border:1px solid #3d3200;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:11px;color:#f59e0b}
.ap-warn strong{color:#fbbf24}
.reset-btn{margin-top:30px;padding:10px 16px;background:var(--s1);border:1px solid var(--bd);color:var(--rd);font-size:11px;font-family:inherit;border-radius:8px;cursor:pointer;display:block;width:100%}
.reset-btn:hover{background:#1a0808;border-color:var(--rd)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:12px;font-family:inherit;z-index:9999;border:1px solid #2a2a3e;max-width:90%;text-align:center;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.setup-screen{padding:30px 10px;text-align:center}
.setup-screen h2{font-family:'Space Grotesk',sans-serif;color:var(--ac);font-size:20px;margin-bottom:16px}
.setup-screen p{font-size:12px;color:var(--dm);line-height:1.7;margin-bottom:12px;text-align:left}
.setup-screen ol{text-align:left;font-size:11px;color:var(--tx);line-height:2;padding-left:20px;margin-bottom:16px}
.setup-screen code{background:var(--s2);padding:2px 6px;border-radius:4px;font-size:10px;color:var(--ac)}
.setup-input{width:100%;background:var(--s2);border:2px solid var(--bd);color:#fff;padding:12px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin:12px 0}
.setup-input:focus{border-color:var(--ac)}
.setup-btn{background:var(--ac);color:#000;border:none;padding:12px 24px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100%}
.setup-btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>
<div class="app" id="app"><div style="padding:40px;text-align:center;color:var(--dm)">Loading...</div></div>
<div class="toast" id="toast"></div>
<script>
// ==========================================
// CONFIG — Paste your Google Apps Script URL below
// ==========================================
const SCRIPT_URL = localStorage.getItem('prod90-url') || "";

const DAYS=90, START=new Date(2026,3,10), WAKE=1080;
const DIST=["Social Media","YouTube","Eating","Sleeping","Family Work","Misc/Wasted"];
const DI={"Social Media":"📱","YouTube":"▶️","Eating":"🍔","Sleeping":"💤","Family Work":"👨‍👩‍👧","Misc/Wasted":"🕳️"};
const EXTRAS=["Exercise","Flute Practice","Acharya Prashant"];
const EI={"Exercise":"💪","Flute Practice":"🎵","Acharya Prashant":"🧘"};
const RT=[{v:1,l:"Poor",c:"#ef4444",e:"🔴"},{v:2,l:"Low",c:"#f59e0b",e:"🟠"},{v:3,l:"Avg",c:"#eab308",e:"🟡"},{v:4,l:"Good",c:"#22c55e",e:"🟢"},{v:5,l:"Great",c:"#00c9a7",e:"🌟"}];

let D={}, VW="today", SD=null, EX={}, SYNC="loading", SAVE_TIMER=null;

const di=d=>Math.floor((d-START)/864e5);
const id=i=>{const d=new Date(START);d.setDate(d.getDate()+i);return d};
const fm=d=>d.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
const pc=(v,t)=>t?Math.round(v/t*100):0;
const ti=()=>Math.max(0,Math.min(DAYS-1,di(new Date())));
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtM=m=>{const h=Math.floor(m/60),r=m%60;return h>0?(r>0?h+'h '+r+'m':h+'h'):r+'m'};

// ==========================================
// CLOUD SYNC
// ==========================================
async function cloudLoad(){
  if(!SCRIPT_URL){SYNC="no-url";return}
  SYNC="loading";
  try{
    const r=await fetch(SCRIPT_URL);
    const data=await r.json();
    if(data&&!data.error&&typeof data==='object'){
      D=data;
      localStorage.setItem('prod90-local',JSON.stringify(D)); // local cache
      SYNC="ok";
    } else {
      // Try local cache
      const c=localStorage.getItem('prod90-local');
      if(c)D=JSON.parse(c);
      SYNC=data.error?"err":"ok";
    }
  }catch(e){
    // Offline — use local cache
    const c=localStorage.getItem('prod90-local');
    if(c)D=JSON.parse(c);
    SYNC="offline";
  }
}

function cloudSave(){
  // Save to local cache immediately
  localStorage.setItem('prod90-local',JSON.stringify(D));
  // Debounce cloud save (2 seconds after last change)
  if(SAVE_TIMER)clearTimeout(SAVE_TIMER);
  SAVE_TIMER=setTimeout(doCloudSave,2000);
  SYNC="saving";
  updateSyncUI();
}

async function doCloudSave(){
  if(!SCRIPT_URL){SYNC="no-url";updateSyncUI();return}
  try{
    const r=await fetch(SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(D),
      mode:'no-cors'
    });
    // no-cors means we can't read response, but it works
    SYNC="ok";
  }catch(e){
    SYNC="offline";
  }
  updateSyncUI();
}

function updateSyncUI(){
  const el=document.getElementById('sync-dot');
  if(!el)return;
  const map={
    "ok":'<span class="sync-ok">● Synced to cloud</span>',
    "saving":'<span class="sync-saving">● Saving...</span>',
    "err":'<span class="sync-err">● Sync error</span>',
    "offline":'<span class="sync-or" style="color:var(--or)">● Offline (cached locally)</span>',
    "loading":'<span class="sync-loading">● Loading...</span>',
    "no-url":'<span class="sync-err">● No script URL set</span>'
  };
  el.innerHTML=map[SYNC]||'';
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ==========================================
// SCORING: 18 waking hours. Unlogged = 0.
// ==========================================
function score(dd){
  if(!dd)return{score:0,workMin:0,extraMin:0,loggedMin:0,unloggedMin:WAKE,distractMin:0};
  let wMin=0,wW=0,dMin=0;
  (dd.slots||[]).forEach(s=>{
    if(s.rating>0&&s.minutes>0){
      wMin+=s.minutes;
      const dm=Object.values(s.distractions||{}).reduce((a,b)=>a+(b||0),0);
      dMin+=dm;
      const eff=Math.max(0,s.minutes-dm);
      wW+=eff*(s.rating/5);
    }
  });
  let eMin=0,eW=0;
  EXTRAS.forEach(k=>{const e=(dd.extras||{})[k];
    if(e&&e.done&&e.minutes>0){eMin+=e.minutes;eW+=e.minutes*((e.rating||3)/5)}});
  const loggedMin=Math.min(WAKE,wMin+eMin),unloggedMin=WAKE-loggedMin;
  const sc=Math.round(Math.max(0,Math.min(100,((wW+eW)/WAKE)*100)));
  return{score:sc,workMin:wMin,extraMin:eMin,loggedMin,unloggedMin,distractMin:dMin};
}

// ==========================================
// RENDER
// ==========================================
function render(){
  if(!SCRIPT_URL && !localStorage.getItem('prod90-url')){renderSetup();return}
  const t=ti(),a=SD!=null?SD:t,dn=t+1,pp=pc(dn,DAYS);
  let h='<div class="hdr"><div class="hdr-top"><div><h1>90-DAY TRACKER</h1>';
  h+='<p class="hdr-sub">Day '+dn+' of '+DAYS+' · '+pp+'% complete</p>';
  h+='<div class="sync-status" id="sync-dot"></div>';
  h+='</div><div class="hdr-ring"><svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="21" fill="none" stroke="#1e1e28" stroke-width="4"/>';
  h+='<circle cx="25" cy="25" r="21" fill="none" stroke="var(--ac)" stroke-width="4" stroke-dasharray="'+pp*1.32+' 132" stroke-linecap="round" transform="rotate(-90 25 25)"/></svg>';
  h+='<span>'+dn+'</span></div></div>';
  h+='<div class="nav">';
  h+='<button class="'+(VW==='today'?'on':'')+'" onclick="V(\'today\')">📝 Log</button>';
  h+='<button class="'+(VW==='calendar'?'on':'')+'" onclick="V(\'calendar\')">📅 Cal</button>';
  h+='<button class="'+(VW==='stats'?'on':'')+'" onclick="V(\'stats\')">📊 Stats</button>';
  h+='</div></div>';
  if(VW==='today')h+=rDay(a,t);
  else if(VW==='calendar')h+=rCal(t);
  else h+=rStats(t);
  document.getElementById('app').innerHTML=h;
  updateSyncUI();
}

function renderSetup(){
  let h='<div class="setup-screen"><h2>🔧 One-Time Setup</h2>';
  h+='<p>To make your data permanent and accessible from any device, you need a free Google Apps Script backend. This takes 2 minutes:</p>';
  h+='<ol>';
  h+='<li>Go to <code>script.google.com</code></li>';
  h+='<li>Click <strong>"New Project"</strong></li>';
  h+='<li>Delete existing code, paste the backend script (provided separately)</li>';
  h+='<li>Click <strong>Deploy → New deployment</strong></li>';
  h+='<li>Set type to <strong>"Web app"</strong></li>';
  h+='<li>Set "Execute as" → <strong>Me</strong></li>';
  h+='<li>Set "Who has access" → <strong>Anyone</strong></li>';
  h+='<li>Click <strong>Deploy</strong> and authorize</li>';
  h+='<li>Copy the <strong>Web App URL</strong> and paste below</li>';
  h+='</ol>';
  h+='<input class="setup-input" id="url-input" type="url" placeholder="Paste your Web App URL here...">';
  h+='<button class="setup-btn" onclick="saveURL()">Connect & Start Tracking</button>';
  h+='<p style="margin-top:16px;font-size:10px;color:var(--dm)">Your data is stored privately in YOUR Google Drive. No one else can access it.</p>';
  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function saveURL(){
  const url=document.getElementById('url-input').value.trim();
  if(!url||!url.startsWith('https://script.google.com')){toast('⚠️ Paste a valid Google Apps Script URL');return}
  localStorage.setItem('prod90-url',url);
  location.reload();
}

// ==========================================
// DAY VIEW
// ==========================================
function rDay(a,t){
  const dd=D[a]||{slots:[],extras:{},note:""},dt=id(a);
  if(a>t)return'<div class="day-hdr"><button class="arr" onclick="nav(-1)" '+(a===0?'disabled':'')+'>◀</button><div style="text-align:center"><h2>'+fm(dt)+'</h2><span class="day-tag">Day '+(a+1)+'</span></div><button class="arr" onclick="nav(1)" '+(a>=DAYS-1?'disabled':'')+'>▶</button></div><div class="future-msg">🔮 This day hasn\'t arrived yet.</div>';
  const sc=score(dd);
  const c=sc.score>=80?"var(--ac)":sc.score>=60?"var(--gn)":sc.score>=40?"var(--yl)":sc.score>=20?"var(--or)":"var(--rd)";
  const vd=sc.score>=80?"🔥 On Fire!":sc.score>=60?"✅ Solid":sc.score>=40?"⚠️ Push Harder":sc.score>=20?"😐 Needs Work":"❌ Wake Up!";
  const wP=pc(sc.workMin,WAKE),eP=pc(sc.extraMin,WAKE),uP=pc(sc.unloggedMin,WAKE);
  let h='<div class="day-hdr"><button class="arr" onclick="nav(-1)" '+(a===0?'disabled':'')+'>◀</button>';
  h+='<div style="text-align:center"><h2>'+fm(dt)+'</h2><span class="day-tag">Day '+(a+1)+(a===t?' · TODAY':'')+'</span></div>';
  h+='<button class="arr" onclick="nav(1)" '+(a>=DAYS-1?'disabled':'')+'>▶</button></div>';

  h+='<div class="score-card"><div class="score-big" style="color:'+c+'">'+sc.score+'</div>';
  h+='<div class="score-sub">/100 '+vd+'</div>';
  h+='<div class="score-bar"><div class="score-fill" style="width:'+sc.score+'%;background:'+c+'"></div></div>';
  h+='<div class="time-grid">';
  h+='<div class="time-box"><div class="v" style="color:var(--ac)">'+fmtM(sc.workMin)+'</div><div>Deep Work</div></div>';
  h+='<div class="time-box"><div class="v" style="color:var(--bl)">'+fmtM(sc.extraMin)+'</div><div>Activities</div></div>';
  h+='<div class="time-box"><div class="v" style="color:var(--rd)">'+fmtM(sc.unloggedMin)+'</div><div>Unlogged</div></div></div>';
  h+='<div class="day-bar"><div class="day-bar-track">';
  h+='<div class="db-seg" style="width:'+wP+'%;background:var(--ac)"></div>';
  h+='<div class="db-seg" style="width:'+eP+'%;background:var(--bl)"></div>';
  h+='<div class="db-seg" style="width:'+uP+'%;background:#1a1a1a;border:1px dashed #333"></div>';
  h+='</div><div class="db-legend"><span><i style="background:var(--ac)"></i>Work '+wP+'%</span>';
  h+='<span><i style="background:var(--bl)"></i>Activities '+eP+'%</span>';
  h+='<span><i style="background:#333"></i>Unlogged '+uP+'%</span></div></div></div>';

  // Slots
  var slots=dd.slots||[];
  h+='<div class="sec-title"><span>⏱️ Work Sessions ('+slots.length+')</span><button class="add-btn" onclick="addSlot('+a+')" style="margin:0">+ Add</button></div>';
  slots.forEach((s,i)=>{
    var ri=s.rating>0?RT[s.rating-1]:{c:"#555",l:"Unrated"};
    var exp=EX['s'+a+'_'+i];
    var dM=0;if(s.distractions)Object.values(s.distractions).forEach(v=>dM+=(v||0));
    h+='<div class="slot" style="border-left-color:'+ri.c+'"><div class="slot-hdr" onclick="tog(\'s'+a+'_'+i+'\')">';
    h+='<div><span class="slot-name">'+(esc(s.desc)||'Session '+(i+1))+'</span>';
    if(s.rating>0&&s.minutes>0)h+='<span class="slot-badge" style="background:'+ri.c+'">'+s.minutes+'m · '+ri.l+'</span>';
    else h+='<span style="font-size:9px;color:var(--dm);margin-left:6px">Unrated</span>';
    h+='</div><div class="slot-meta">';
    if(dM>0)h+='<span style="color:var(--rd)">⚡'+dM+'m</span>';
    h+='<button class="del-btn" onclick="event.stopPropagation();delSlot('+a+','+i+')" title="Remove">✕</button>';
    h+='<span>'+(exp?'▾':'▸')+'</span></div></div>';
    if(exp){
      h+='<div class="slot-body">';
      h+='<div class="field"><label>What did you work on?</label>';
      h+='<input type="text" value="'+esc(s.desc||'')+'" placeholder="e.g. DSA, reading, project..." style="width:100%" onchange="uS('+a+','+i+',\'desc\',this.value)"></div>';
      h+='<div class="time-row"><div class="field"><label>Start</label>';
      h+='<input type="time" value="'+(s.startTime||'')+'" onchange="uS('+a+','+i+',\'startTime\',this.value)"></div>';
      h+='<span>→</span>';
      h+='<div class="field"><label>End</label>';
      h+='<input type="time" value="'+(s.endTime||'')+'" onchange="uS('+a+','+i+',\'endTime\',this.value)"></div>';
      h+='<div class="field"><label>Min</label>';
      h+='<input type="number" min="0" max="1080" value="'+(s.minutes||'')+'" placeholder="0" onchange="uS('+a+','+i+',\'minutes\',+this.value)"></div></div>';
      h+='<div class="field"><label>Effectiveness</label><div class="rating-row">';
      RT.forEach(r=>{h+='<button class="r-btn'+(s.rating===r.v?' on':'')+'" style="'+(s.rating===r.v?'background:'+r.c:'')+'" onclick="uS('+a+','+i+',\'rating\','+r.v+')">'+r.e+' '+r.v+'</button>'});
      h+='</div></div><div class="field"><label>Distraction Minutes</label><div class="d-grid">';
      DIST.forEach(d=>{
        h+='<div class="d-item"><span class="ic">'+DI[d]+'</span><span class="nm">'+d+'</span>';
        h+='<input type="number" min="0" max="300" value="'+((s.distractions||{})[d]||'')+'" placeholder="0" onchange="uD('+a+','+i+',\''+d+'\',+this.value)"></div>';
      });
      h+='</div></div></div>';
    }
    h+='</div>';
  });
  if(!slots.length)h+='<button class="add-btn" onclick="addSlot('+a+')" style="width:100%;padding:14px;font-size:12px">+ Add Your First Work Session</button>';

  // Extras
  h+='<div class="sec-title"><span>🏃 Activities</span></div>';
  EXTRAS.forEach(k=>{
    var e=(dd.extras||{})[k]||{done:false,rating:0,minutes:0};
    h+='<div class="extra"><div class="extra-hdr"><span class="extra-icon">'+EI[k]+'</span>';
    h+='<span class="extra-name">'+k+'</span>';
    h+='<label class="tog"><input type="checkbox" '+(e.done?'checked':'')+' onchange="uE('+a+',\''+k+'\',\'done\',this.checked)">';
    h+='<span class="tog-t"><span class="tog-th"></span></span></label></div>';
    if(e.done){
      h+='<div class="extra-body"><div class="extra-row">';
      h+='<div class="field"><label>Minutes</label>';
      h+='<input type="number" min="0" max="300" value="'+(e.minutes||'')+'" placeholder="0" onchange="uE('+a+',\''+k+'\',\'minutes\',+this.value)"></div>';
      h+='<div class="field"><label>Rating</label><div class="rating-row">';
      RT.forEach(r=>{h+='<button class="r-btn'+(e.rating===r.v?' on':'')+'" style="'+(e.rating===r.v?'background:'+r.c:'')+'" onclick="uE('+a+',\''+k+'\',\'rating\','+r.v+')">'+r.v+'</button>'});
      h+='</div></div></div></div>';
    }
    h+='</div>';
  });

  // AP escape warning
  var ap=(dd.extras||{})["Acharya Prashant"];
  if(ap&&ap.done&&ap.minutes>90&&sc.workMin<180)
    h+='<div class="ap-warn">⚠️ <strong>Escape pattern:</strong> '+ap.minutes+'m on AP but only '+sc.workMin+'m deep work.</div>';

  h+='<div class="sec-title"><span>📝 Notes</span></div>';
  h+='<textarea rows="3" placeholder="Reflections..." onchange="uN('+a+',this.value)">'+esc(dd.note||'')+'</textarea>';
  return h;
}

// ==========================================
// CALENDAR VIEW
// ==========================================
function rCal(t){
  let h='<div class="sec-title" style="margin-top:16px"><span>90-Day Heatmap</span></div>';
  h+='<div class="cal-legend"><span><i style="background:#1a1a1a"></i>No data</span>';
  h+='<span><i style="background:var(--rd)"></i>&lt;30</span><span><i style="background:var(--yl)"></i>30-59</span>';
  h+='<span><i style="background:var(--gn)"></i>60-79</span><span><i style="background:var(--ac)"></i>80+</span></div>';
  h+='<div class="cal-grid">';
  ["S","M","T","W","T","F","S"].forEach(d=>h+='<div class="cal-dl">'+d+'</div>');
  const fd=START.getDay();
  for(let i=0;i<fd;i++)h+='<div class="cal-empty"></div>';
  for(let i=0;i<DAYS;i++){
    const sc=D[i]?score(D[i]).score:-1;
    const bg=sc<0?"#1a1a1a":sc>=80?"var(--ac)":sc>=60?"var(--gn)":sc>=30?"var(--yl)":"var(--rd)";
    const cls=i===t?"today":i>t?"future":"";
    h+='<div class="cal-cell '+cls+'" style="background:'+bg+'" onclick="'+(i<=t?'selDay('+i+')':'')+'">'+( i+1)+'</div>';
  }
  h+='</div>';

  h+='<div class="sec-title"><span>📈 Weekly Averages</span></div><div class="week-bars">';
  for(let w=0;w<13;w++){
    let days=[],sum=0;
    for(let d=0;d<7;d++){const i=w*7+d;if(i<DAYS&&i<=t&&D[i]){days.push(i);sum+=score(D[i]).score}}
    const avg=days.length?Math.round(sum/days.length):0;
    const c=avg>=60?"var(--ac)":avg>=30?"var(--yl)":"var(--rd)";
    h+='<div class="wb"><div class="wb-track"><div class="wb-fill" style="height:'+avg+'%;background:'+c+'"></div></div><span class="wb-label">W'+(w+1)+'</span></div>';
  }
  h+='</div>';

  h+='<div class="sec-title"><span>📅 Monthly</span></div>';
  [["Month 1",0,29],["Month 2",30,59],["Month 3",60,89]].forEach(([l,s,e])=>{
    let days=[],sum=0,tw=0;
    for(let i=s;i<=e&&i<=t;i++){if(D[i]){const r=score(D[i]);days.push(i);sum+=r.score;tw+=r.loggedMin}}
    const avg=days.length?Math.round(sum/days.length):0;
    h+='<div class="slot-stat"><span class="slot-stat-l">'+l+'</span><span class="slot-stat-r">Avg: '+avg+' · '+days.length+' days · '+Math.floor(tw/60)+'h</span></div>';
  });
  return h;
}

// ==========================================
// STATS VIEW
// ==========================================
function rStats(t){
  const tp=t+1;let sc=[];
  for(let i=0;i<tp;i++)sc.push(D[i]?score(D[i]):{score:0,workMin:0,extraMin:0,loggedMin:0,unloggedMin:WAKE,distractMin:0});
  const scores=sc.map(s=>s.score);
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  let streak=0;for(let i=t;i>=0;i--){if((D[i]?score(D[i]).score:0)>=40)streak++;else break}
  const totalWork=sc.reduce((a,s)=>a+s.workMin,0);
  const totalExtra=sc.reduce((a,s)=>a+s.extraMin,0);
  const totalUnlogged=sc.reduce((a,s)=>a+s.unloggedMin,0);
  const totalDist=sc.reduce((a,s)=>a+s.distractMin,0);
  const totalWake=tp*WAKE;
  const avgUnlog=tp?Math.round(totalUnlogged/tp/60*10)/10:0;

  const sl=avg>=65?{t:"You're LOCKED IN.",c:"var(--ac)",i:"🏆"}
    :avg>=45?{t:"Decent. But decent doesn't win.",c:"var(--yl)",i:"⚡"}
    :avg>=25?{t:"Most of your day is unaccounted for.",c:"var(--or)",i:"⚠️"}
    :{t:"You're losing the war against time.",c:"var(--rd)",i:"🚨"};

  let h='<div class="sec-title" style="margin-top:16px"><span>Dashboard</span></div>';
  h+='<div class="serious-banner" style="border-color:'+sl.c+'"><span class="serious-icon">'+sl.i+'</span>';
  h+='<div><div class="serious-text" style="color:'+sl.c+'">'+sl.t+'</div>';
  h+='<div class="serious-sub">'+tp+' days elapsed · Avg '+avgUnlog+'h/day unlogged</div></div></div>';
  h+='<div class="stat-grid">';
  h+='<div class="stat-box"><div class="stat-val" style="color:var(--ac)">'+avg+'<span class="stat-sub">/100</span></div><div class="stat-label">Avg Score</div></div>';
  h+='<div class="stat-box"><div class="stat-val" style="color:var(--bl)">'+Math.floor(totalWork/60)+'<span class="stat-sub">hrs</span></div><div class="stat-label">Deep Work</div></div>';
  h+='<div class="stat-box"><div class="stat-val" style="color:var(--yl)">'+streak+'<span class="stat-sub"> days</span></div><div class="stat-label">Streak ≥40</div></div>';
  h+='<div class="stat-box"><div class="stat-val" style="color:var(--rd)">'+Math.floor(totalUnlogged/60)+'<span class="stat-sub">hrs</span></div><div class="stat-label">Unlogged</div></div></div>';

  h+='<div class="sec-title"><span>📊 Time Allocation</span></div>';
  h+='<div class="day-bar"><div class="day-bar-track">';
  h+='<div class="db-seg" style="width:'+pc(totalWork,totalWake)+'%;background:var(--ac)"></div>';
  h+='<div class="db-seg" style="width:'+pc(totalExtra,totalWake)+'%;background:var(--bl)"></div>';
  h+='<div class="db-seg" style="width:'+pc(totalUnlogged,totalWake)+'%;background:#1a1a1a;border:1px dashed #333"></div>';
  h+='</div><div class="db-legend">';
  h+='<span><i style="background:var(--ac)"></i>Work '+pc(totalWork,totalWake)+'%</span>';
  h+='<span><i style="background:var(--bl)"></i>Activities '+pc(totalExtra,totalWake)+'%</span>';
  h+='<span><i style="background:#333"></i>Unlogged '+pc(totalUnlogged,totalWake)+'%</span></div></div>';

  h+='<div class="sec-title"><span>⏱️ Daily Work Hours</span></div><div class="histo-row">';
  const hb={"0-2h":0,"2-4h":0,"4-6h":0,"6-8h":0,"8h+":0};
  for(let i=0;i<tp;i++){const wm=D[i]?score(D[i]).workMin:0;const hrs=wm/60;
    if(hrs<2)hb["0-2h"]++;else if(hrs<4)hb["2-4h"]++;else if(hrs<6)hb["4-6h"]++;else if(hrs<8)hb["6-8h"]++;else hb["8h+"]++}
  const hc={"0-2h":"var(--rd)","2-4h":"var(--or)","4-6h":"var(--yl)","6-8h":"var(--gn)","8h+":"var(--ac)"};
  Object.entries(hb).forEach(([k,v])=>{
    h+='<div class="histo-col"><div class="histo-bar"><div class="histo-fill" style="height:'+(tp?pc(v,tp):0)+'%;background:'+hc[k]+'"></div></div>';
    h+='<span class="histo-label">'+k+'</span><span class="histo-count">'+v+'</span></div>';
  });
  h+='</div>';

  const dT={};DIST.forEach(d=>dT[d]=0);
  Object.keys(D).filter(k=>+k<=t).forEach(k=>{
    (D[k].slots||[]).forEach(s=>{if(s.distractions)Object.entries(s.distractions).forEach(([n,v])=>dT[n]=(dT[n]||0)+(v||0))})});
  const dTotal=Object.values(dT).reduce((a,b)=>a+b,0);
  h+='<div class="sec-title"><span>🕳️ Distractions</span></div>';
  if(!dTotal)h+='<p class="no-data">No distraction data yet.</p>';
  else{
    h+='<div class="d-stats"><div class="d-total">Total: <strong>'+Math.floor(dTotal/60)+'h '+dTotal%60+'m</strong> (avg '+Math.round(dTotal/tp)+'m/day)</div>';
    Object.entries(dT).sort((a,b)=>b[1]-a[1]).forEach(([n,m])=>{
      h+='<div class="d-row"><span class="d-row-l">'+DI[n]+' '+n+'</span><div class="d-row-bar"><div class="d-row-fill" style="width:'+pc(m,dTotal)+'%"></div></div>';
      h+='<span class="d-row-v">'+Math.floor(m/60)+'h '+m%60+'m ('+pc(m,dTotal)+'%)</span></div>';
    });
    h+='</div>';
  }

  h+='<div class="sec-title"><span>🏃 Activities</span></div>';
  EXTRAS.forEach(k=>{
    let done=0,tM=0,rS=0;
    Object.keys(D).filter(x=>+x<=t).forEach(x=>{const e=(D[x].extras||{})[k];if(e&&e.done){done++;tM+=(e.minutes||0);rS+=(e.rating||0)}});
    h+='<div class="slot-stat"><span class="slot-stat-l">'+EI[k]+' '+k+'</span>';
    h+='<span class="slot-stat-r">'+done+'/'+tp+' days · '+Math.floor(tM/60)+'h '+tM%60+'m · '+(done?(rS/done).toFixed(1):'—')+'/5</span></div>';
  });
  let apEsc=0;
  for(let i=0;i<=t;i++){if(!D[i])continue;const ap=(D[i].extras||{})["Acharya Prashant"];if(ap&&ap.done&&ap.minutes>60&&score(D[i]).workMin<180)apEsc++}
  if(apEsc)h+='<div class="ap-warn">⚠️ <strong>'+apEsc+' escape day(s)</strong> — AP >1hr with <3hr deep work.</div>';

  h+='<div class="sec-title"><span>🔥 Score Distribution</span></div><div class="histo-row">';
  [{r:"0-19",c:"var(--rd)"},{r:"20-39",c:"var(--or)"},{r:"40-59",c:"var(--yl)"},{r:"60-79",c:"var(--gn)"},{r:"80-100",c:"var(--ac)"}].forEach(b=>{
    const[lo,hi]=b.r.split("-").map(Number);
    const count=scores.filter(s=>s>=lo&&s<=hi).length;
    h+='<div class="histo-col"><div class="histo-bar"><div class="histo-fill" style="height:'+(tp?pc(count,tp):0)+'%;background:'+b.c+'"></div></div>';
    h+='<span class="histo-label">'+b.r+'</span><span class="histo-count">'+count+'</span></div>';
  });
  h+='</div>';

  // Settings at bottom
  h+='<div class="sec-title"><span>⚙️ Settings</span></div>';
  h+='<div class="slot-stat"><span class="slot-stat-l">Cloud URL</span><span class="slot-stat-r" style="font-size:8px;word-break:break-all">'+esc((localStorage.getItem('prod90-url')||'').slice(0,50))+'...</span></div>';
  h+='<button class="reset-btn" style="margin-top:10px;color:var(--or);border-color:#3d3200" onclick="localStorage.removeItem(\'prod90-url\');location.reload()">🔄 Change Script URL</button>';
  h+='<button class="reset-btn" onclick="if(confirm(\'DELETE ALL data from cloud and local? This cannot be undone.\')){D={};cloudSave();render()}">🗑️ Reset All Data</button>';
  return h;
}

// ==========================================
// DATA OPERATIONS
// ==========================================
function V(v){VW=v;render()}
function nav(d){SD=Math.max(0,Math.min(DAYS-1,(SD!=null?SD:ti())+d));render()}
function selDay(i){SD=i;VW='today';render()}
function tog(k){EX[k]=!EX[k];render()}
function ensD(i){if(!D[i])D[i]={slots:[],extras:{},note:""};if(!Array.isArray(D[i].slots))D[i].slots=[];return D[i]}

function addSlot(i){const d=ensD(i);d.slots.push({desc:"",startTime:"",endTime:"",minutes:0,rating:0,distractions:{}});cloudSave();EX['s'+i+'_'+(d.slots.length-1)]=true;render()}
function delSlot(i,si){ensD(i).slots.splice(si,1);cloudSave();render()}
function uS(di,si,f,v){const d=ensD(di),s=d.slots[si];s[f]=v;
  if((f==='startTime'||f==='endTime')&&s.startTime&&s.endTime){
    const sp=s.startTime.split(':'),ep=s.endTime.split(':');
    let df=(+ep[0]*60+ +ep[1])-(+sp[0]*60+ +sp[1]);if(df<0)df+=1440;s.minutes=df}
  cloudSave();render()}
function uD(di,si,dk,v){const s=ensD(di).slots[si];if(!s.distractions)s.distractions={};s.distractions[dk]=v;cloudSave();render()}
function uE(di,k,f,v){const d=ensD(di);if(!d.extras[k])d.extras[k]={done:false,rating:0,minutes:0};d.extras[k][f]=v;cloudSave();render()}
function uN(di,v){ensD(di).note=v;cloudSave()}

// ==========================================
// BOOT
// ==========================================
(async function(){
  if(!SCRIPT_URL){render();return}
  await cloudLoad();
  render();
})();
</script>
</body>
</html>
